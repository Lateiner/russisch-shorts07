<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video-Quiz: 6 Russische Szenen</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .video-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.4s;
            background: #fff;
            padding: 20px;
            box-sizing: border-box;
        }

        .visual { font-size: 4rem; margin-bottom: 10px; }
        .description { font-size: 1.1rem; color: #333; font-weight: 500; }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        .btn-group { display: flex; gap: 15px; margin-top: 20px; }

        .hotspot {
            padding: 12px 35px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .hotspot:active { transform: scale(0.9); }

        .progress-bar {
            width: 100%;
            max-width: 600px;
            height: 6px;
            background: #ddd;
            margin-top: 10px;
            border-radius: 3px;
        }

        #inner-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .feedback-box {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            min-height: 1.5rem;
            text-align: center;
            max-width: 600px;
        }

        .status-info { margin-top: 10px; font-size: 0.9rem; color: #666; }

        .btn-start {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Interaktives Training</h2>
    <div class="status-info" id="counter">Szene 1 / 6</div>

    <div class="video-container">
        <div class="video-frame" id="display">
            <div class="visual" id="emoji">🎬</div>
            <div class="description" id="text">Bereit für das Video?</div>
        </div>
        
        <div class="overlay" id="overlay">
            <p>Was sagt die Person?</p>
            <div class="btn-group">
                <button class="hotspot" onclick="checkAnswer('На')">На</button>
                <button class="hotspot" onclick="checkAnswer('Держи')">Держи</button>
            </div>
        </div>
    </div>

    <div class="progress-bar"><div id="inner-bar"></div></div>

    <div class="feedback-box" id="feedback"></div>
    <button class="btn-start" id="controlBtn" onclick="startNextScene()">Start</button>

    <script>
        const scenes = [
            { emoji: "🚶‍♂️...☕", text: "Jemand reicht dir eine Tasse Kaffee.", correct: "На", explain: "Korrekt! 'На' wird beim einfachen Reichen genutzt." },
            { emoji: "🏋️‍♂️...📦", text: "Jemand gibt dir ein schweres Paket zum Festhalten.", correct: "Держи", explain: "Richtig! 'Держи' bedeutet wörtlich 'Halte fest'." },
            { emoji: "🙋‍♂️...✏️", text: "Ein Freund gibt dir kurz einen Stift.", correct: "На", explain: "Genau! Kurzes Geben = 'На'." },
            { emoji: "🏃‍♂️...🔑", text: "Dir wird ein Schlüsselbund zugeworfen.", correct: "Держи", explain: "Richtig! Beim Auffangen/Festhalten sagt man 'Держи'." },
            { emoji: "👵...🍬", text: "Die Oma bietet dir ein Bonbon an.", correct: "На", explain: "Richtig! Beim Anbieten ist 'На' perfekt." },
            { emoji: "🐕...🦮", text: "Jemand reicht dir die Hundeleine: 'Halt mal kurz'.", correct: "Держи", explain: "Perfekt! 'Держи' für das Übernehmen einer Aufgabe." }
        ];

        let currentScene = 0;
        let isPlaying = false;

        function startNextScene() {
            if (currentScene >= scenes.length) {
                location.reload();
                return;
            }
            
            document.getElementById('controlBtn').style.display = "none";
            document.getElementById('feedback').innerText = "";
            document.getElementById('counter').innerText = `Szene ${currentScene + 1} / ${scenes.length}`;
            playScene();
        }

        function playScene() {
            let progress = 0;
            const bar = document.getElementById('inner-bar');
            const scene = scenes[currentScene];
            
            document.getElementById('emoji').innerText = scene.emoji;
            document.getElementById('text').innerText = "... Szene läuft ...";

            let interval = setInterval(() => {
                progress += 2;
                bar.style.width = progress + "%";

                if (progress >= 70) {
                    clearInterval(interval);
                    document.getElementById('text').innerText = "JETZT: Was sagst du?";
                    document.getElementById('overlay').style.display = "flex";
                }
            }, 50);
        }

        function checkAnswer(choice) {
            const scene = scenes[currentScene];
            const feedback = document.getElementById('feedback');
            document.getElementById('overlay').style.display = "none";
            document.getElementById('inner-bar').style.width = "100%";

            if (choice === scene.correct) {
                feedback.innerText = "✨ " + scene.explain;
                feedback.style.color = "var(--success)";
            } else {
                feedback.innerText = "❌ Nicht ganz. " + scene.explain;
                feedback.style.color = "var(--error)";
            }

            currentScene++;
            const btn = document.getElementById('controlBtn');
            btn.style.display = "inline-block";
            btn.innerText = currentScene < scenes.length ? "Nächste Szene" : "Neustart";
        }
    </script>
</body>
</html>
